name: Monthly Traffic Report

on:
  schedule:
    # Runs on the 2nd of each month at 08:00 UTC
    # (gives the 1st a full day to settle before aggregating)
    - cron: '0 8 2 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to report on (YYYY-MM). Defaults to previous month.'
        required: false

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate monthly report
        id: report
        run: |
          set -euo pipefail

          DATA_DIR="_data/traffic/daily"
          REPORT_DIR="_data/traffic/reports"
          mkdir -p "$REPORT_DIR"

          # Determine which month to report on
          if [ -n "${{ github.event.inputs.month || '' }}" ]; then
            REPORT_MONTH="${{ github.event.inputs.month }}"
          else
            # Default to previous month
            REPORT_MONTH=$(date -u -d "last month" +%Y-%m 2>/dev/null || date -u -v-1m +%Y-%m)
          fi

          echo "Generating report for: ${REPORT_MONTH}"
          echo "report_month=${REPORT_MONTH}" >> "$GITHUB_OUTPUT"

          YEAR=$(echo "$REPORT_MONTH" | cut -d- -f1)
          MONTH=$(echo "$REPORT_MONTH" | cut -d- -f2)

          # Collect all daily files for the target month
          total_views=0
          total_views_unique=0
          total_clones=0
          total_clones_unique=0
          days_with_data=0
          peak_views_day=""
          peak_views_count=0

          # Aggregate paths and referrers across all snapshots in the month
          all_paths_file=$(mktemp)
          all_referrers_file=$(mktemp)
          echo "[]" > "$all_paths_file"
          echo "[]" > "$all_referrers_file"

          for file in "${DATA_DIR}/${REPORT_MONTH}"-*.json; do
            [ -f "$file" ] || continue
            days_with_data=$((days_with_data + 1))

            day_views=$(jq -r '.views.count // 0' "$file")
            day_views_unique=$(jq -r '.views.uniques // 0' "$file")
            day_clones=$(jq -r '.clones.count // 0' "$file")
            day_clones_unique=$(jq -r '.clones.uniques // 0' "$file")

            total_views=$((total_views + day_views))
            total_views_unique=$((total_views_unique + day_views_unique))
            total_clones=$((total_clones + day_clones))
            total_clones_unique=$((total_clones_unique + day_clones_unique))

            if [ "$day_views" -gt "$peak_views_count" ]; then
              peak_views_count=$day_views
              peak_views_day=$(jq -r '.date' "$file")
            fi

            # Merge paths snapshots (accumulate counts by path)
            jq -s '
              [ .[0] + .[1] | group_by(.path) | .[] |
                {path: .[0].path, title: .[0].title,
                 count: ([.[].count] | add),
                 uniques: ([.[].uniques] | max),
                 observations: length} ]
            ' "$all_paths_file" <(jq '.paths_snapshot // []' "$file") > "${all_paths_file}.tmp"
            mv "${all_paths_file}.tmp" "$all_paths_file"

            # Merge referrers snapshots
            jq -s '
              [ .[0] + .[1] | group_by(.referrer) | .[] |
                {referrer: .[0].referrer,
                 count: ([.[].count] | add),
                 uniques: ([.[].uniques] | max),
                 observations: length} ]
            ' "$all_referrers_file" <(jq '.referrers_snapshot // []' "$file") > "${all_referrers_file}.tmp"
            mv "${all_referrers_file}.tmp" "$all_referrers_file"
          done

          # Sort paths and referrers by observation frequency, then by count
          top_paths=$(jq '[sort_by(-.observations, -.count) | .[:10] | .[] |
            {path: .path, title: .title, observations: .observations}]' "$all_paths_file")

          top_referrers=$(jq '[sort_by(-.observations, -.count) | .[:10] | .[] |
            {referrer: .referrer, observations: .observations}]' "$all_referrers_file")

          # Check for previous month report (for comparison)
          if [ "$MONTH" = "01" ]; then
            prev_year=$((YEAR - 1))
            prev_month="12"
          else
            prev_year=$YEAR
            prev_month=$(printf "%02d" $((10#$MONTH - 1)))
          fi
          prev_report="${REPORT_DIR}/${prev_year}-${prev_month}.md"
          prev_views="N/A"
          if [ -f "$prev_report" ]; then
            prev_views=$(grep -oP 'Total Views: \*\*\K[0-9,]+' "$prev_report" 2>/dev/null || echo "N/A")
          fi

          # Calculate days in month
          days_in_month=$(cal "$((10#$MONTH))" "$YEAR" | awk 'NF {DAYS = $NF}; END {print DAYS}')
          missing_days=$((days_in_month - days_with_data))

          # Build the Markdown report
          REPORT_FILE="${REPORT_DIR}/${REPORT_MONTH}.md"

          cat > "$REPORT_FILE" << REPORT_EOF
          # 📊 Monthly Traffic Report: ${REPORT_MONTH}

          *Generated on $(date -u +%Y-%m-%d) | Data collected from ${days_with_data}/${days_in_month} days*

          $([ "$missing_days" -gt 0 ] && echo "> ⚠️ **${missing_days} day(s) of data missing this month.** Some totals may be understated." || echo "")

          ## Summary

          | Metric | Total | Unique |
          |--------|------:|-------:|
          | Views | ${total_views} | ${total_views_unique} |
          | Clones | ${total_clones} | ${total_clones_unique} |

          - **Peak day:** ${peak_views_day} (${peak_views_count} views)
          - **Daily average:** $((total_views / (days_with_data > 0 ? days_with_data : 1))) views/day
          $([ "$prev_views" != "N/A" ] && echo "- **vs. previous month:** ${prev_views} total views" || echo "- *No previous month data for comparison*")

          ## Most Visited Pages

          *Based on rolling 14-day snapshots observed during the month. Ranked by how frequently a page appeared in the daily top-10.*

          | Rank | Page | Times in Top 10 |
          |------|------|----------------:|
          $(echo "$top_paths" | jq -r 'to_entries | .[] | "| \(.key + 1) | \(.value.title // .value.path) | \(.value.observations) |"')

          ## Top Referrers

          *Rolling 14-day snapshot highlights — not precise monthly totals.*

          | Rank | Source | Times in Top 10 |
          |------|--------|----------------:|
          $(echo "$top_referrers" | jq -r 'to_entries | .[] | "| \(.key + 1) | \(.value.referrer) | \(.value.observations) |"')

          ## Daily Views

          \`\`\`
          $(for file in "${DATA_DIR}/${REPORT_MONTH}"-*.json; do
            [ -f "$file" ] || continue
            date=$(jq -r '.date' "$file")
            views=$(jq -r '.views.count // 0' "$file")
            bar=$(printf '%*s' "$((views / 3))" '' | tr ' ' '█')
            printf "%-12s %4d %s\n" "$date" "$views" "$bar"
          done)
          \`\`\`

          ## 💡 Recommended New Resource

          $(
          # Build a recommendation by comparing top-visited pages against
          # existing Learning Pathways and guides in the repo.
          #
          # Strategy: map popular paths to topic keywords, check if a dedicated
          # Learning Pathway or guide already exists, and recommend the
          # highest-traffic topic that lacks one.

          # Catalog existing learning pathways and guides (by filename stem)
          existing_resources=""
          for f in Learning-Pathways/*.md ai-education/*.md admin/*.md students/*.md professional-development/*.md; do
            [ -f "$f" ] && existing_resources="${existing_resources} $(basename "$f" .md | tr '[:upper:]' '[:lower:]')"
          done

          # Define known topic mappings: path substring -> topic label -> expected resource filename stem
          declare -A topic_labels
          declare -A topic_stems
          declare -A topic_descriptions
          topic_labels["classroom"]="GitHub Classroom"
          topic_stems["classroom"]="github-classroom"
          topic_descriptions["classroom"]="A step-by-step Learning Pathway for GitHub Classroom covering assignment creation, autograding setup, roster management, and reusing assignments across semesters."

          topic_labels["actions"]="GitHub Actions"
          topic_stems["actions"]="github-actions"
          topic_descriptions["actions"]="A Learning Pathway for GitHub Actions in education covering CI/CD basics, autograding workflows, and deploying student projects to GitHub Pages."

          topic_labels["codespace"]="GitHub Codespaces"
          topic_stems["codespace"]="codespaces"
          topic_descriptions["codespace"]="A guide for using GitHub Codespaces in the classroom covering devcontainer setup, billing management for student use, and template repositories."

          topic_labels["pages"]="GitHub Pages"
          topic_stems["pages"]="github-pages"
          topic_descriptions["pages"]="A guide for using GitHub Pages for student portfolios, project showcases, and course websites — connecting Markdown, Git, and Actions into a tangible outcome."

          topic_labels["security"]="GitHub Security"
          topic_stems["security"]="github-security"
          topic_descriptions["security"]="A Learning Pathway for GitHub security features in education covering Dependabot, secret scanning, code scanning, and teaching secure coding practices."

          topic_labels["copilot"]="GitHub Copilot (Advanced)"
          topic_stems["copilot"]="copilot-advanced"
          topic_descriptions["copilot"]="An advanced Copilot guide going beyond getting started — covering Copilot Chat workflows, custom instructions, workspace agents, and Copilot in the CLI."

          topic_labels["enterprise"]="Enterprise Administration"
          topic_stems["enterprise"]="enterprise-admin"
          topic_descriptions["enterprise"]="A comprehensive guide for campus IT administrators on managing GitHub Enterprise for education — org structure, SSO/SAML, seat management, and policies."

          topic_labels["open-source"]="Open Source in Education"
          topic_stems["open-source"]="open-source-education"
          topic_descriptions["open-source"]="A Learning Pathway for bringing open source practices into the classroom — contributing to real projects, licensing basics, and building student portfolios through OSS."

          # Score each topic by how often its keyword appeared in top paths
          best_topic=""
          best_score=0

          for keyword in "\${!topic_labels[@]}"; do
            stem="\${topic_stems[$keyword]}"
            # Skip if a resource with this stem already exists
            if echo "$existing_resources" | grep -qi "$stem"; then
              continue
            fi

            # Count observations of this keyword in top paths
            score=\$(echo "$top_paths" | jq -r '.[].path // .[].title // ""' | grep -ci "$keyword" || true)

            # Also check referrers for the keyword
            ref_score=\$(echo "$top_referrers" | jq -r '.[].referrer // ""' | grep -ci "$keyword" || true)
            score=\$((score + ref_score))

            if [ "\$score" -gt "\$best_score" ]; then
              best_score=\$score
              best_topic=\$keyword
            fi
          done

          # If no keyword matched from traffic, fall back to the #2 most-visited
          # non-homepage page that lacks a learning pathway
          if [ -z "\$best_topic" ]; then
            # Pick the top non-overview path and suggest deepening it
            runner_up=\$(echo "$top_paths" | jq -r '[.[] | select(.path != null and (.path | contains("Overview") | not))][0].title // "a trending topic"')
            echo "Based on this month's traffic patterns, consider creating a deeper guide for **\${runner_up}** — it consistently appeared in your top visited pages but doesn't yet have a dedicated Learning Pathway with structured objectives, prerequisites, and a step-by-step journey."
          else
            label="\${topic_labels[$best_topic]}"
            desc="\${topic_descriptions[$best_topic]}"
            echo "Based on this month's traffic, visitors are actively looking for **\${label}** content (keyword \\\`\${best_topic}\\\` appeared in top pages \${best_score} time(s) this month). **Recommended:** \${desc}"
          fi
          )

          ---
          *This report is auto-generated by the [Monthly Traffic Report](.github/workflows/monthly-report.yml) workflow.*
          REPORT_EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$REPORT_FILE"

          echo "report_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
          echo "total_views=${total_views}" >> "$GITHUB_OUTPUT"
          echo "total_clones=${total_clones}" >> "$GITHUB_OUTPUT"
          echo "days_with_data=${days_with_data}" >> "$GITHUB_OUTPUT"

          # Clean up temp files
          rm -f "$all_paths_file" "$all_referrers_file"

          echo "✅ Report generated: ${REPORT_FILE}"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/traffic/reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: add monthly traffic report for ${{ steps.report.outputs.report_month }}"
            git push
          fi

      - name: Create or update GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_MONTH="${{ steps.report.outputs.report_month }}"
          REPORT_FILE="${{ steps.report.outputs.report_file }}"
          TITLE="📊 Monthly Traffic Report: ${REPORT_MONTH}"

          # Check if an issue already exists for this month
          existing=$(gh issue list --search "\"${TITLE}\" in:title" --json number --jq '.[0].number // empty')

          body=$(cat "$REPORT_FILE")

          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
            echo "✅ Updated existing issue #${existing}"
          else
            gh issue create \
              --title "$TITLE" \
              --body "$body" \
              --label "traffic-report"
            echo "✅ Created new issue"
          fi
